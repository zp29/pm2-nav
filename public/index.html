<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PM2 服务导航</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f4ed;
      --paper-strong: #fffefa;
      --ink: #171714;
      --soft-ink: #565a53;
      --quiet: #85887d;
      --line: #ded9cc;
      --line-strong: #c9c0af;
      --mint: #167a68;
      --mint-soft: #dceee7;
      --coral: #c45f46;
      --coral-soft: #f2ded6;
      --gold: #bd8b2c;
      --gold-soft: #f3e7c7;
      --sky: #2f6f9f;
      --sky-soft: #dfeaf1;
      --shadow: 0 18px 50px rgba(44, 38, 26, .12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: var(--paper);
      background-image:
        linear-gradient(rgba(23, 23, 20, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 23, 20, .035) 1px, transparent 1px),
        linear-gradient(135deg, #f7f4ed 0%, #eef6f1 44%, #f8eee8 100%);
      background-size: 28px 28px, 28px 28px, 100% 100%;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 42px 0 44px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px;
      align-items: end;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line-strong);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .mark {
      position: relative;
      width: 54px;
      height: 54px;
      flex: 0 0 54px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--paper-strong);
      box-shadow: var(--shadow);
    }

    .mark::before,
    .mark::after {
      position: absolute;
      content: "";
      inset: 13px;
      border: 2px solid var(--mint);
      border-radius: 50%;
    }

    .mark::after {
      inset: 22px 12px 12px 22px;
      border-color: var(--coral);
      border-radius: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hostline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
      color: var(--soft-ink);
      font-size: 14px;
    }

    .host-pill {
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 254, 250, .7);
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 108px);
      gap: 10px;
    }

    .metric {
      min-height: 70px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .72);
      box-shadow: 0 10px 26px rgba(44, 38, 26, .08);
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: var(--quiet);
      font-size: 12px;
    }

    .manager {
      display: grid;
      grid-template-columns: minmax(160px, .7fr) minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin: 22px 0 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .7);
      box-shadow: 0 10px 26px rgba(44, 38, 26, .06);
    }

    .field {
      min-width: 0;
    }

    .field input,
    .dialog-input {
      width: 100%;
      min-height: 44px;
      padding: 0 13px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
      background: rgba(255, 254, 250, .88);
      color: var(--ink);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .field input:focus,
    .dialog-input:focus {
      border-color: var(--mint);
      background: var(--paper-strong);
      box-shadow: 0 0 0 4px rgba(22, 122, 104, .12);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      margin: 14px 0 22px;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .search input {
      width: 100%;
      min-height: 44px;
      padding: 0 14px 0 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
      background: rgba(255, 254, 250, .82);
      color: var(--ink);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .search input:focus {
      border-color: var(--mint);
      background: var(--paper-strong);
      box-shadow: 0 0 0 4px rgba(22, 122, 104, .12);
    }

    .search::before {
      position: absolute;
      top: 50%;
      left: 15px;
      width: 12px;
      height: 12px;
      content: "";
      border: 2px solid var(--quiet);
      border-radius: 50%;
      transform: translateY(-58%);
      pointer-events: none;
    }

    .search::after {
      position: absolute;
      top: 27px;
      left: 28px;
      width: 8px;
      height: 2px;
      content: "";
      border-radius: 2px;
      background: var(--quiet);
      transform: rotate(45deg);
      pointer-events: none;
    }

    .segments {
      display: inline-grid;
      grid-template-columns: repeat(4, minmax(64px, 1fr));
      min-height: 44px;
      padding: 3px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .75);
    }

    .segment {
      min-width: 64px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--soft-ink);
      transition: color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .segment[aria-pressed="true"] {
      background: var(--ink);
      color: var(--paper-strong);
      box-shadow: 0 7px 18px rgba(23, 23, 20, .18);
    }

    .solid,
    .refresh,
    .logout {
      min-height: 44px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--paper-strong);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .solid {
      padding: 0 18px;
      white-space: nowrap;
    }

    .refresh,
    .logout {
      width: 44px;
    }

    .solid:hover,
    .refresh:hover,
    .logout:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(23, 23, 20, .18);
    }

    .refresh:disabled {
      cursor: wait;
      opacity: .72;
    }

    .refresh-icon {
      display: block;
      width: 15px;
      height: 15px;
      margin: auto;
      border: 2px solid currentColor;
      border-left-color: transparent;
      border-radius: 50%;
    }

    .refresh-icon::after {
      display: block;
      width: 0;
      height: 0;
      margin: -5px 0 0 10px;
      content: "";
      border: 4px solid transparent;
      border-left-color: currentColor;
      transform: rotate(-10deg);
    }

    .logout-icon {
      position: relative;
      display: block;
      width: 16px;
      height: 16px;
      margin: auto;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 3px;
    }

    .logout-icon::after {
      position: absolute;
      top: 5px;
      right: -7px;
      width: 10px;
      height: 2px;
      content: "";
      background: currentColor;
    }

    .statusbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      min-height: 24px;
      margin-bottom: 16px;
      color: var(--soft-ink);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .service {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      min-height: 236px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .86);
      box-shadow: 0 14px 35px rgba(44, 38, 26, .08);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .service:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
    }

    .service-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .name {
      min-width: 0;
    }

    .name strong {
      display: block;
      font-size: 18px;
      line-height: 1.22;
      overflow-wrap: anywhere;
    }

    .name span {
      display: block;
      margin-top: 5px;
      color: var(--quiet);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 82px;
      justify-content: center;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--sky-soft);
      color: var(--sky);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .service.online .badge {
      background: var(--mint-soft);
      color: var(--mint);
    }

    .service.custom .badge {
      background: var(--gold-soft);
      color: var(--gold);
    }

    .service.stopped .badge,
    .service.errored .badge {
      background: var(--coral-soft);
      color: var(--coral);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .cell {
      min-height: 54px;
      padding: 10px;
      border: 1px solid rgba(222, 217, 204, .78);
      border-radius: 6px;
      background: rgba(247, 244, 237, .58);
    }

    .cell span {
      display: block;
      color: var(--quiet);
      font-size: 11px;
    }

    .cell strong {
      display: block;
      margin-top: 5px;
      font-size: 14px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .launch {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      padding: 0 12px 0 14px;
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--paper-strong);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .launch:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(23, 23, 20, .22);
      background: #25251f;
    }

    .launch code {
      min-width: 0;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .launch .arrow {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 50%;
      background: var(--gold-soft);
      color: var(--ink);
      font-size: 16px;
      line-height: 1;
    }

    .unavailable {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--quiet);
      background: rgba(247, 244, 237, .58);
      font-size: 13px;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .subtle {
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 254, 250, .76);
      color: var(--soft-ink);
      font-size: 12px;
      transition: border-color .18s ease, color .18s ease, background .18s ease;
    }

    .subtle:hover {
      border-color: var(--line-strong);
      background: var(--paper-strong);
      color: var(--ink);
    }

    .empty,
    .error {
      min-height: 190px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .82);
      color: var(--soft-ink);
      box-shadow: 0 14px 35px rgba(44, 38, 26, .08);
    }

    .empty strong,
    .error strong {
      display: block;
      margin-bottom: 10px;
      color: var(--ink);
      font-size: 20px;
    }

    .skeleton {
      position: relative;
      overflow: hidden;
    }

    .skeleton::after {
      position: absolute;
      inset: 0;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .62), transparent);
      animation: sweep 1.2s infinite;
    }

    .dialog {
      width: min(420px, calc(100vw - 28px));
      padding: 20px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--paper-strong);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    .dialog::backdrop {
      background: rgba(23, 23, 20, .28);
      backdrop-filter: blur(4px);
    }

    .dialog h2 {
      margin: 0 0 14px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .dialog p {
      margin: -6px 0 14px;
      color: var(--quiet);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .dialog-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    @keyframes sweep {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    @media (max-width: 900px) {
      .shell {
        width: min(100% - 24px, 680px);
        padding-top: 24px;
      }

      .masthead,
      .manager,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric {
        min-height: 62px;
        padding: 10px;
      }

      .metric strong {
        font-size: 24px;
      }

      .segments {
        width: 100%;
      }

      .refresh,
      .logout {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead">
      <section class="brand" aria-label="PM2 服务导航">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>PM2 服务导航</h1>
          <div class="hostline">
            <span>当前主机</span>
            <span class="host-pill" id="hostPill">localhost</span>
            <span class="host-pill" id="configPill">config.json</span>
          </div>
        </div>
      </section>

      <section class="summary" aria-label="服务概览">
        <div class="metric"><strong id="totalCount">0</strong><span>导航</span></div>
        <div class="metric"><strong id="onlineCount">0</strong><span>在线</span></div>
        <div class="metric"><strong id="portCount">0</strong><span>可跳转</span></div>
      </section>
    </header>

    <form class="manager" id="customForm">
      <label class="field">
        <input id="customName" type="text" placeholder="名称" maxlength="80" autocomplete="off">
      </label>
      <label class="field">
        <input id="customTarget" type="text" placeholder="完整链接或端口" maxlength="500" autocomplete="off">
      </label>
      <button class="solid" type="submit">新增</button>
    </form>

    <section class="toolbar" aria-label="筛选工具">
      <label class="search">
        <input id="searchInput" type="search" placeholder="搜索服务、端口或状态" autocomplete="off">
      </label>
      <div class="segments" role="group" aria-label="状态筛选">
        <button class="segment" type="button" data-filter="all" aria-pressed="true">全部</button>
        <button class="segment" type="button" data-filter="online" aria-pressed="false">在线</button>
        <button class="segment" type="button" data-filter="with-port" aria-pressed="false">端口</button>
        <button class="segment" type="button" data-filter="custom" aria-pressed="false">自定义</button>
      </div>
      <button class="refresh" id="refreshButton" type="button" aria-label="刷新">
        <span class="refresh-icon" aria-hidden="true"></span>
      </button>
      <button class="logout" id="logoutButton" type="button" aria-label="退出">
        <span class="logout-icon" aria-hidden="true"></span>
      </button>
    </section>

    <div class="statusbar">
      <span id="resultText">正在读取 PM2</span>
      <span id="updatedText"></span>
    </div>

    <section class="grid" id="appGrid" aria-live="polite">
      <article class="service skeleton"></article>
      <article class="service skeleton"></article>
      <article class="service skeleton"></article>
    </section>
  </main>

  <dialog class="dialog" id="aliasDialog">
    <form id="aliasForm" method="dialog">
      <h2>PM2 别名</h2>
      <p id="aliasSource"></p>
      <input class="dialog-input" id="aliasInput" type="text" placeholder="留空恢复原名" maxlength="80" autocomplete="off">
      <div class="dialog-actions">
        <button class="subtle" id="aliasCancel" type="button">取消</button>
        <button class="solid" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script>
    const state = {
      apps: [],
      customLinks: [],
      filter: 'all',
      query: '',
      loading: false,
      aliasTarget: null,
    };

    const appGrid = document.querySelector('#appGrid');
    const hostPill = document.querySelector('#hostPill');
    const configPill = document.querySelector('#configPill');
    const totalCount = document.querySelector('#totalCount');
    const onlineCount = document.querySelector('#onlineCount');
    const portCount = document.querySelector('#portCount');
    const resultText = document.querySelector('#resultText');
    const updatedText = document.querySelector('#updatedText');
    const searchInput = document.querySelector('#searchInput');
    const refreshButton = document.querySelector('#refreshButton');
    const logoutButton = document.querySelector('#logoutButton');
    const customForm = document.querySelector('#customForm');
    const customName = document.querySelector('#customName');
    const customTarget = document.querySelector('#customTarget');
    const aliasDialog = document.querySelector('#aliasDialog');
    const aliasForm = document.querySelector('#aliasForm');
    const aliasInput = document.querySelector('#aliasInput');
    const aliasSource = document.querySelector('#aliasSource');
    const aliasCancel = document.querySelector('#aliasCancel');
    const filterButtons = Array.from(document.querySelectorAll('[data-filter]'));

    hostPill.textContent = location.hostname || 'localhost';

    searchInput.addEventListener('input', function (event) {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    refreshButton.addEventListener('click', loadApps);
    logoutButton.addEventListener('click', logout);

    customForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      const name = customName.value.trim();
      const target = customTarget.value.trim();
      if (!name || !target) return;

      await apiFetch('/api/custom-links', {
        method: 'POST',
        body: { name, target },
      });

      customName.value = '';
      customTarget.value = '';
      await loadApps();
    });

    aliasForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      if (!state.aliasTarget) return;

      await apiFetch('/api/aliases', {
        method: 'POST',
        body: {
          configKey: state.aliasTarget.configKey,
          alias: aliasInput.value.trim(),
        },
      });

      aliasDialog.close();
      state.aliasTarget = null;
      await loadApps();
    });

    aliasCancel.addEventListener('click', function () {
      aliasDialog.close();
      state.aliasTarget = null;
    });

    filterButtons.forEach(function (button) {
      button.addEventListener('click', function () {
        state.filter = button.dataset.filter;
        filterButtons.forEach(function (item) {
          item.setAttribute('aria-pressed', String(item === button));
        });
        render();
      });
    });

    loadApps();
    window.setInterval(loadApps, 15000);

    async function loadApps() {
      if (state.loading) return;

      state.loading = true;
      refreshButton.disabled = true;

      try {
        const payload = await apiFetch('/api/apps', { method: 'GET' });
        state.apps = payload.apps || [];
        state.customLinks = payload.customLinks || [];
        configPill.textContent = payload.config && payload.config.configPath
          ? shortPath(payload.config.configPath)
          : 'config.json';
        logoutButton.hidden = !(payload.config && payload.config.authRequired);
        updatedText.textContent = '更新于 ' + formatClock(payload.generatedAt);
        render();
      } catch (error) {
        renderError(error);
      } finally {
        state.loading = false;
        refreshButton.disabled = false;
      }
    }

    function render() {
      const items = getVisibleItems();
      const allItems = getAllItems();
      totalCount.textContent = String(allItems.length);
      onlineCount.textContent = String(state.apps.filter(function (app) { return app.status === 'online'; }).length);
      portCount.textContent = String(allItems.filter(hasTarget).length);
      resultText.textContent = items.length + ' 个结果';

      appGrid.innerHTML = '';

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.innerHTML = '<strong>没有匹配的服务</strong><span>换一个关键词或筛选条件。</span>';
        appGrid.appendChild(empty);
        return;
      }

      items.forEach(function (item) {
        appGrid.appendChild(item.type === 'custom' ? createCustomCard(item) : createPm2Card(item));
      });
    }

    function renderError(error) {
      totalCount.textContent = '0';
      onlineCount.textContent = '0';
      portCount.textContent = '0';
      resultText.textContent = '读取失败';
      updatedText.textContent = '';
      appGrid.innerHTML = '';

      const panel = document.createElement('div');
      panel.className = 'error';
      panel.innerHTML = '<strong>PM2 暂时不可用</strong><span></span>';
      panel.querySelector('span').textContent = error.message;
      appGrid.appendChild(panel);
    }

    function getVisibleItems() {
      return getAllItems().filter(function (item) {
        if (state.filter === 'online' && item.status !== 'online') return false;
        if (state.filter === 'with-port' && !hasTarget(item)) return false;
        if (state.filter === 'custom' && item.type !== 'custom') return false;

        if (!state.query) return true;
        const haystack = [
          item.name,
          item.originalName,
          item.namespace,
          item.status,
          item.port,
          item.url,
          item.pid,
          item.mode,
        ].filter(Boolean).join(' ').toLowerCase();

        return haystack.includes(state.query);
      });
    }

    function getAllItems() {
      const customItems = state.customLinks.map(function (link) {
        return {
          ...link,
          type: 'custom',
          status: 'custom',
        };
      });

      return state.apps.concat(customItems);
    }

    function createPm2Card(app) {
      const card = document.createElement('article');
      card.className = 'service ' + normalizeStatus(app.status);

      const top = document.createElement('div');
      top.className = 'service-top';

      const name = document.createElement('div');
      name.className = 'name';
      const title = document.createElement('strong');
      title.textContent = app.name;
      const namespace = document.createElement('span');
      namespace.textContent = '#' + app.id + ' / ' + (app.namespace || 'default') + originalSuffix(app);
      name.append(title, namespace);

      top.append(name, createBadge(app.status || 'unknown'));

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.append(
        createCell('CPU', formatCpu(app.cpu)),
        createCell('内存', formatBytes(app.memory)),
        createCell('PID', app.pid || '-'),
        createCell('重启', app.restarts || 0),
      );

      const actions = document.createElement('div');
      actions.className = 'card-actions';
      const aliasButton = document.createElement('button');
      aliasButton.className = 'subtle';
      aliasButton.type = 'button';
      aliasButton.textContent = '别名';
      aliasButton.addEventListener('click', function () {
        openAliasDialog(app);
      });
      actions.append(aliasButton);

      card.append(top, meta, createLaunch(app), actions);
      return card;
    }

    function createCustomCard(link) {
      const card = document.createElement('article');
      card.className = 'service custom';

      const top = document.createElement('div');
      top.className = 'service-top';

      const name = document.createElement('div');
      name.className = 'name';
      const title = document.createElement('strong');
      title.textContent = link.name;
      const source = document.createElement('span');
      source.textContent = link.port ? 'port / ' + link.port : 'url';
      name.append(title, source);

      top.append(name, createBadge('custom'));

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.append(
        createCell('类型', link.port ? '端口' : '链接'),
        createCell('目标', link.port || trimProtocol(link.url)),
        createCell('创建', formatDate(link.createdAt)),
        createCell('更新', formatDate(link.updatedAt)),
      );

      const actions = document.createElement('div');
      actions.className = 'card-actions';
      const deleteButton = document.createElement('button');
      deleteButton.className = 'subtle';
      deleteButton.type = 'button';
      deleteButton.textContent = '删除';
      deleteButton.addEventListener('click', async function () {
        if (!window.confirm('删除这个导航？')) return;
        await apiFetch('/api/custom-links/' + encodeURIComponent(link.id), { method: 'DELETE' });
        await loadApps();
      });
      actions.append(deleteButton);

      card.append(top, meta, createLaunch(link), actions);
      return card;
    }

    function createBadge(text) {
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.innerHTML = '<span class="dot" aria-hidden="true"></span><span></span>';
      badge.querySelector('span:last-child').textContent = text;
      return badge;
    }

    function createCell(label, value) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const labelNode = document.createElement('span');
      labelNode.textContent = label;
      const valueNode = document.createElement('strong');
      valueNode.textContent = value === 0 ? '0' : String(value || '-');
      cell.append(labelNode, valueNode);
      return cell;
    }

    function createLaunch(item) {
      const href = getHref(item);
      if (!href) {
        const unavailable = document.createElement('div');
        unavailable.className = 'unavailable';
        unavailable.innerHTML = '<span>未检测到端口</span><span>env / listen</span>';
        return unavailable;
      }

      const link = document.createElement('a');
      link.className = 'launch';
      link.href = href;
      link.target = '_blank';
      link.rel = 'noreferrer';

      const code = document.createElement('code');
      code.textContent = trimProtocol(href);

      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.setAttribute('aria-hidden', 'true');
      arrow.textContent = '↗';

      link.append(code, arrow);
      return link;
    }

    function openAliasDialog(app) {
      state.aliasTarget = app;
      aliasSource.textContent = app.originalName || app.name;
      aliasInput.value = app.alias || '';
      aliasDialog.showModal();
      aliasInput.focus();
    }

    async function logout() {
      await fetch('/api/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      });
      location.href = '/login';
    }

    async function apiFetch(path, options) {
      const response = await fetch(path, {
        method: options.method || 'GET',
        headers: { 'Content-Type': 'application/json' },
        cache: 'no-store',
        body: options.body ? JSON.stringify(options.body) : undefined,
      });

      if (response.status === 401) {
        location.href = '/login';
        throw new Error('需要登录');
      }

      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        throw new Error(payload.message || '请求失败');
      }

      return payload;
    }

    function hasTarget(item) {
      return Boolean(item.url || item.port);
    }

    function getHref(item) {
      if (item.url) return item.url;
      if (item.port) return buildServiceUrl(item.port);
      return null;
    }

    function buildServiceUrl(port) {
      const protocol = location.protocol === 'https:' ? 'https:' : 'http:';
      const host = formatHostname(location.hostname || 'localhost');
      return protocol + '//' + host + ':' + port;
    }

    function formatHostname(hostname) {
      if (hostname.includes(':') && !hostname.startsWith('[')) {
        return '[' + hostname + ']';
      }
      return hostname;
    }

    function originalSuffix(app) {
      if (!app.alias || !app.originalName || app.originalName === app.name) return '';
      return ' / ' + app.originalName;
    }

    function normalizeStatus(status) {
      return String(status || 'unknown').toLowerCase().replace(/[^a-z0-9_-]/g, '');
    }

    function formatCpu(value) {
      const number = Number(value) || 0;
      return number.toFixed(number >= 10 ? 0 : 1) + '%';
    }

    function formatBytes(value) {
      const bytes = Number(value) || 0;
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(1) + ' GB';
    }

    function formatClock(value) {
      const date = value ? new Date(value) : new Date();
      return date.toLocaleTimeString('zh-CN', { hour12: false });
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
    }

    function trimProtocol(value) {
      return String(value || '').replace(/^https?:\/\//, '');
    }

    function shortPath(value) {
      const text = String(value || '');
      const parts = text.split('/');
      return parts.slice(-2).join('/') || text;
    }
  </script>
</body>
</html>
