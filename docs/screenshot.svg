<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4ED"/>
      <stop offset="0.47" stop-color="#EEF6F1"/>
      <stop offset="1" stop-color="#F8EEE8"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#171714" stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2C261A" flood-opacity=".12"/>
    </filter>
    <style>
      .font { font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; }
      .ink { fill: #171714; }
      .muted { fill: #565A53; }
      .quiet { fill: #85887D; }
      .card { fill: #FFFEFA; fill-opacity: .86; stroke: #DED9CC; }
      .pill { fill: #FFFEFA; fill-opacity: .72; stroke: #DED9CC; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#paper)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>

  <g class="font" transform="translate(52 44)">
    <g>
      <rect x="0" y="0" width="54" height="54" rx="8" fill="#FFFEFA" stroke="#C9C0AF" filter="url(#shadow)"/>
      <circle cx="27" cy="27" r="15" stroke="#167A68" stroke-width="3"/>
      <rect x="24" y="24" width="16" height="16" rx="3" stroke="#C45F46" stroke-width="3"/>
    </g>
    <text x="72" y="38" class="ink" font-size="46" font-weight="800">PM2 服务导航</text>
    <text x="72" y="68" class="muted" font-size="14">当前主机</text>
    <rect x="132" y="51" width="108" height="26" rx="13" class="pill"/>
    <text x="145" y="69" class="ink" font-size="13">localhost</text>
    <rect x="250" y="51" width="132" height="26" rx="13" class="pill"/>
    <text x="263" y="69" class="ink" font-size="13">/data/config.json</text>

    <g transform="translate(780 0)">
      <rect x="0" y="0" width="108" height="70" rx="8" class="pill" filter="url(#shadow)"/>
      <text x="14" y="36" class="ink" font-size="28" font-weight="800">6</text>
      <text x="14" y="57" class="quiet" font-size="12">导航</text>
      <rect x="118" y="0" width="108" height="70" rx="8" class="pill" filter="url(#shadow)"/>
      <text x="132" y="36" class="ink" font-size="28" font-weight="800">4</text>
      <text x="132" y="57" class="quiet" font-size="12">在线</text>
      <rect x="236" y="0" width="108" height="70" rx="8" class="pill" filter="url(#shadow)"/>
      <text x="250" y="36" class="ink" font-size="28" font-weight="800">5</text>
      <text x="250" y="57" class="quiet" font-size="12">可跳转</text>
    </g>

    <line x1="0" y1="98" x2="1096" y2="98" stroke="#C9C0AF"/>

    <g transform="translate(0 120)">
      <rect width="1096" height="68" rx="8" fill="#FFFEFA" fill-opacity=".72" stroke="#DED9CC"/>
      <rect x="14" y="12" width="250" height="44" rx="8" fill="#FFFEFA" stroke="#C9C0AF"/>
      <text x="30" y="40" class="quiet" font-size="14">名称</text>
      <rect x="276" y="12" width="620" height="44" rx="8" fill="#FFFEFA" stroke="#C9C0AF"/>
      <text x="292" y="40" class="quiet" font-size="14">完整链接或端口</text>
      <rect x="910" y="12" width="72" height="44" rx="8" fill="#171714"/>
      <text x="932" y="40" fill="#FFFEFA" font-size="14" font-weight="700">新增</text>
    </g>

    <g transform="translate(0 202)">
      <rect width="432" height="44" rx="8" fill="#FFFEFA" fill-opacity=".82" stroke="#C9C0AF"/>
      <circle cx="24" cy="22" r="8" stroke="#85887D" stroke-width="2"/>
      <path d="M30 28L38 35" stroke="#85887D" stroke-width="2" stroke-linecap="round"/>
      <text x="52" y="28" class="quiet" font-size="14">搜索服务、端口或状态</text>
      <rect x="448" width="292" height="44" rx="8" fill="#FFFEFA" fill-opacity=".75" stroke="#C9C0AF"/>
      <rect x="452" y="4" width="69" height="36" rx="6" fill="#171714"/>
      <text x="475" y="28" fill="#FFFEFA" font-size="13">全部</text>
      <text x="548" y="28" class="muted" font-size="13">在线</text>
      <text x="617" y="28" class="muted" font-size="13">端口</text>
      <text x="686" y="28" class="muted" font-size="13">自定义</text>
      <rect x="756" width="44" height="44" rx="8" fill="#171714"/>
      <path d="M786 20A10 10 0 1 0 781 30" stroke="#FFFEFA" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M781 30H789V22" stroke="#FFFEFA" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="72" class="muted" font-size="13">6 个结果</text>
      <text x="1000" y="72" class="muted" font-size="13">更新于 10:52:00</text>
    </g>

    <g transform="translate(0 296)">
      <g>
        <rect width="350" height="222" rx="8" class="card" filter="url(#shadow)"/>
        <text x="18" y="34" class="ink" font-size="19" font-weight="800">前端本地</text>
        <text x="18" y="55" class="quiet" font-size="12">#1 / default / dev</text>
        <rect x="252" y="18" width="78" height="28" rx="14" fill="#DCEEE7" stroke="#DED9CC"/>
        <circle cx="270" cy="32" r="4" fill="#167A68"/>
        <text x="282" y="36" fill="#167A68" font-size="12">online</text>
        <g transform="translate(18 78)">
          <rect width="148" height="54" rx="6" fill="#F7F4ED" fill-opacity=".58" stroke="#DED9CC"/>
          <text x="10" y="19" class="quiet" font-size="11">CPU</text>
          <text x="10" y="39" class="ink" font-size="14" font-weight="700">0.2%</text>
          <rect x="162" width="148" height="54" rx="6" fill="#F7F4ED" fill-opacity=".58" stroke="#DED9CC"/>
          <text x="172" y="19" class="quiet" font-size="11">内存</text>
          <text x="172" y="39" class="ink" font-size="14" font-weight="700">4.1 MB</text>
        </g>
        <rect x="18" y="150" width="310" height="48" rx="8" fill="#171714"/>
        <text x="32" y="180" fill="#FFFEFA" class="mono" font-size="12">localhost:6789</text>
        <circle cx="304" cy="174" r="14" fill="#F3E7C7"/>
        <text x="297" y="180" class="ink" font-size="16">↗</text>
      </g>

      <g transform="translate(364 0)">
        <rect width="350" height="222" rx="8" class="card" filter="url(#shadow)"/>
        <text x="18" y="34" class="ink" font-size="19" font-weight="800">Vite 服务端</text>
        <text x="18" y="55" class="quiet" font-size="12">#2 / default / dev-server</text>
        <rect x="252" y="18" width="78" height="28" rx="14" fill="#DCEEE7" stroke="#DED9CC"/>
        <circle cx="270" cy="32" r="4" fill="#167A68"/>
        <text x="282" y="36" fill="#167A68" font-size="12">online</text>
        <g transform="translate(18 78)">
          <rect width="148" height="54" rx="6" fill="#F7F4ED" fill-opacity=".58" stroke="#DED9CC"/>
          <text x="10" y="19" class="quiet" font-size="11">PID</text>
          <text x="10" y="39" class="ink" font-size="14" font-weight="700">45653</text>
          <rect x="162" width="148" height="54" rx="6" fill="#F7F4ED" fill-opacity=".58" stroke="#DED9CC"/>
          <text x="172" y="19" class="quiet" font-size="11">重启</text>
          <text x="172" y="39" class="ink" font-size="14" font-weight="700">3</text>
        </g>
        <rect x="18" y="150" width="310" height="48" rx="8" fill="#171714"/>
        <text x="32" y="180" fill="#FFFEFA" class="mono" font-size="12">localhost:6790</text>
        <circle cx="304" cy="174" r="14" fill="#F3E7C7"/>
        <text x="297" y="180" class="ink" font-size="16">↗</text>
      </g>

      <g transform="translate(728 0)">
        <rect width="350" height="222" rx="8" class="card" filter="url(#shadow)"/>
        <text x="18" y="34" class="ink" font-size="19" font-weight="800">本地 API</text>
        <text x="18" y="55" class="quiet" font-size="12">port / 8080</text>
        <rect x="250" y="18" width="82" height="28" rx="14" fill="#F3E7C7" stroke="#DED9CC"/>
        <circle cx="268" cy="32" r="4" fill="#BD8B2C"/>
        <text x="280" y="36" fill="#BD8B2C" font-size="12">custom</text>
        <g transform="translate(18 78)">
          <rect width="148" height="54" rx="6" fill="#F7F4ED" fill-opacity=".58" stroke="#DED9CC"/>
          <text x="10" y="19" class="quiet" font-size="11">类型</text>
          <text x="10" y="39" class="ink" font-size="14" font-weight="700">端口</text>
          <rect x="162" width="148" height="54" rx="6" fill="#F7F4ED" fill-opacity=".58" stroke="#DED9CC"/>
          <text x="172" y="19" class="quiet" font-size="11">目标</text>
          <text x="172" y="39" class="ink" font-size="14" font-weight="700">8080</text>
        </g>
        <rect x="18" y="150" width="310" height="48" rx="8" fill="#171714"/>
        <text x="32" y="180" fill="#FFFEFA" class="mono" font-size="12">localhost:8080</text>
        <circle cx="304" cy="174" r="14" fill="#F3E7C7"/>
        <text x="297" y="180" class="ink" font-size="16">↗</text>
      </g>
    </g>
  </g>
</svg>
